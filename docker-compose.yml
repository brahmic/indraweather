name: indra

services:
  app:
    build: .
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-indra}
      DATABASE_USER: ${POSTGRES_USER:-indra}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PORT: 3000
    ports:
      - "127.0.0.1:${APP_HTTP_PORT:-3000}:3000"
    volumes:
      - satellite_animation:/var/lib/indra/satellite-animation
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-indra}
      POSTGRES_USER: ${POSTGRES_USER:-indra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indra -d indra"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  satellite_animation:
